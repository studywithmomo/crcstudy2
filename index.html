<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medical English Typing</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">

  <style>
body {
  margin: 0;
  min-height: 100vh;
  background-color: #fffaf7;
  background-image: url("ikimono_wooper-looper_12304.jpg");
  background-repeat: repeat;
  background-size: 120px;
  display: flex;
  justify-content: flex-start;
  align-items: center;
  flex-direction: column;
  padding: 20px;
  box-sizing: border-box;
}

/* ===== メインコンテナ ===== */
#gameContainer {
  position: relative;
  margin-top: 20px;
  text-align: center;
  width: 95%;
  max-width: 900px;
  padding: 25px;
  background: rgba(255, 255, 255, 0.95);
  border-radius: 20px;
  box-shadow: 0 0 25px rgba(0,0,0,0.25);
  overflow: visible;
}

#sentence {
  font-size: 50px;
  margin-top: 24px;
  color: #5c4635;
  max-width: 100%;
  word-wrap: break-word;
  overflow-wrap: break-word;
  white-space: normal;
  word-break: break-word;
  overflow-wrap: normal;
}

#jp {
  font-size: 30px;
  color: #5c4635;
  margin-top: 10px;
  max-width: 100%;
  word-wrap: break-word;
  overflow-wrap: break-word;
  white-space: normal;
}

/* ===== 上部コントロール ===== */
#controls {
  flex-shrink: 0;
}

/* ===== 問題文 ===== */
#sentence {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 54px;
  font-weight: 500;   /* 700は太すぎ */
  letter-spacing: 1px;
  color: #5c4635;
}
#sentence span {
  font-family: inherit;
}

#jp {
  font-size: 30px;
  color: #5c4635;
  margin-top: 10px;
}

/* ===== 中央スクロール領域 ===== */
#result,
#rankingBox {
  overflow-y: auto;
}

/* ===== 入力欄は固定 ===== */
#input {
  font-size: 40px;
  color: #5c4635;
  width: 100%;
  margin-top: 20px;
  border-radius: 18px;
  border: 4px solid #ffb6c1;
  padding: 12px;
  font-family: 'M PLUS Rounded 1c', sans-serif;
  flex-shrink: 0;
  outline: none;
  box-shadow: 0 4px 8px rgba(255, 182, 193, 0.3);
  transition: all 0.25s ease;
  box-sizing: border-box;
}

#input:focus {
  border-color: #ff8fab;
  box-shadow: 0 0 0 3px rgba(255, 143, 171, 0.3);
}

#result {
  color: #e76f6f;
  font-size: 36px;
  font-weight: 700;
  font-family: "M PLUS Rounded 1c", sans-serif;
  text-align: center;
  margin-top: 20px;
  letter-spacing: 1px;
  text-shadow: 0 2px 4px rgba(231, 111, 111, 0.18);
}

   #retryBtn {
  background: linear-gradient(135deg, #ffb6c1, #ff69b4);
  color: white;
  border: none;
  border-radius: 999px; /* 超丸い */
  padding: 14px 32px;
  font-size: 18px;
  font-family: "M PLUS Rounded 1c", "Hiragino Maru Gothic ProN", sans-serif;
  cursor: pointer;
  box-shadow: 0 6px 0 #d94c8a;
  transition: transform 0.1s, box-shadow 0.1s;
  display: block;
  margin: 20px auto;

}

#retryBtn:hover {
  transform: translateY(2px);
  box-shadow: 0 4px 0 #d94c8a;
}

#retryBtn:active {
  transform: translateY(6px);
  box-shadow: 0 0 0 #d94c8a;
}

select {
  font-family: 'M PLUS Rounded 1c', sans-serif;
  font-size: 16px;
  padding: 10px 16px;
  border-radius: 16px;
  border: 2px solid #ffb6c1;
  background-color: #fff;
  cursor: pointer;
  margin: 8px;
  box-shadow: 0 4px 8px rgba(255, 105, 180, 0.2);
}

select:focus {
  outline: none;
  border-color: #ff8fab;
  box-shadow: 0 0 0 3px rgba(255, 143, 171, 0.3);
}

#hideSentence {
  position: absolute;
  opacity: 0;
  pointer-events: none;
}


/* 見た目担当 */
.hide-toggle span {
  display: inline-block;
  padding: 10px 22px;
  border-radius: 999px;
  border: 2px solid #ffb6c1;
  background: #fff;
  color: #ff6fae;
  font-size: 18px;
  font-weight: 600;
  transition: all 0.2s ease;
  box-shadow: 0 4px 0 #ffd1dc;
}

/* ホバー時 */
.hide-toggle:hover span {
  transform: translateY(2px);
  box-shadow: 0 2px 0 #ffd1dc;
}

/* チェックON時 */
.hide-toggle input:checked + span {
  background: linear-gradient(135deg, #ffb6c1, #ff69b4);
  color: white;
  box-shadow: 0 4px 0 #d94c8a;
}

#retryBtn {
  position: relative;
  z-index: 10;
}

#showAnswerBtn {
  background: linear-gradient(135deg, #f8b7a3, #f6c1b5);
  color: #6b4f3b;
  border: none;
  border-radius: 20px;
  padding: 12px 24px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
  transition: all 0.25s ease;
}

#showAnswerBtn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 14px rgba(0, 0, 0, 0.18);
}

#showAnswerBtn:active {
  transform: scale(0.97);
}

.query-mode #sentence {
  font-size: 34px;
  line-height: 1.4;
  padding: 0 10px;
}

@media (max-width: 768px) {
  #gameContainer {
    padding: 20px;
    width: 100%;
    margin-top: 8px;
    min-height: 460px;
    background-image: rgba(255,255,255,0.95);
    backdrop-filter: blur(2px);
  }

  #query-mode #sentence {
    font-size: 26px;
    line-height: 1.5;
  }

  #sentence {
    font-size: 64px;
    margin-top: 18px;
  }

  #jp {
    font-size: 28px;
  }

  #input {
    font-size: 34px;
    padding: 18px;
  }

  #retryBtn,
  #showAnswerBtn {
    font-size: 20px;
    width: auto;
    max-width: 320px;
  }

  select {
    font-size: 18px;
    padding: 12px 18px;
  }
  .bubble {
  position: relative;
  background: white;
  border: 2px solid #ffb6c1;
  border-radius: 18px;
  padding: 10px 14px;
  font-size: 18px;
  color: #5c4635;
  max-width: 220px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

/* 吹き出しの“しっぽ” */
.bubble::after {
  content: "";
  position: absolute;
  left: -10px;
  top: 20px;
  border-width: 10px;
  border-style: solid;
  border-color: transparent white transparent transparent;
}
  /* ===== 結果画面レイアウト ===== */
.result-card {
  background: #fff0f6;
  border-radius: 20px;
  padding: 25px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  max-width: 900px;
  margin: 20px auto;

  display: flex;
  align-items: center;
  justify-content: center;
  gap: 30px;
}

.result-flex {
  display: flex;
  justify-content: center;  
  align-items: center;
  gap: 28px;
}
  
.result-right {
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}

.result-character {
  display: flex;
  justify-content: flex-end;
  padding-right: 10px;
}

/* ウーパー画像 */
.wooper-img {
  width: 240px;
  height: auto;
  border-radius: 20px;
  object-fit: cover;
  flex-shrink: 0;
}

/* 吹き出し */
.bubble {
  position: relative;
  background: white;
  border: 2px solid #ffb6c1;
  border-radius: 16px;
  padding: 14px 18px;
  font-size: 18px;
  color: #5c4635;

  min-width: 260px;
  max-width: 320px;
  line-height: 1.5;
}

/* 吹き出しのしっぽ */
.bubble::after {
  content: "";
  position: absolute;
  left: -10px;
  top: 22px;

  border-width: 10px;
  border-style: solid;
  border-color: transparent white transparent transparent;
}

/* スコア */
.score {
  margin-top: 10px;
  font-size: 20px;
}

.rate {
  font-size: 28px;
  font-weight: bold;
  color: #c2185b;
  margin-top: 6px;
}
.result-text {
  flex: 1;
  min-width: 320px;
}
}
          </style>
</head>

<body>

<div id="gameContainer">
    <div id="controls">

 
<!-- ② 問題形式 -->
<select id="questionMode">
  <option value="word" selected>単語</option>
  <option value="query">クエリ</option>
</select>

<!-- ③ 英単語ジャンル（最初は隠す） -->
<select id="wordCategory" style="display:none;">
  <option value="all"> すべて</option>
  <option value="clinical">略語・治験用語</option>
  <option value="disease"> 疾患</option>
  <option value="symptom"> 症状</option>
  <option value="treatment"> 治療</option>
</select>

  <div id="sentence"></div>
  <div id="jp"></div>

  <button id="retryBtn" style="display:none; font-size:28px;">
  もう一度挑戦する
  </button>

  <button id="showAnswerBtn">正解を表示</button>

  <input id="input" type="text" placeholder="ここにタイプ"autofocus>

  <div id="result"></div>


  <!-- ★ 読み込み順は絶対にこの順 -->
  <script src="sentences.js"></script>
  <script src="script.js"></script>
<script>
  console.log("HTML loaded");
</script>

</body>
</html>
